name: taskwin
description: Skill-based competition platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_app_check: ^0.3.2+4
  google_fonts: ^6.1.0
  provider: ^6.1.1
  video_player: ^2.8.3
  image_picker: ^1.0.4
  intl: ^0.19.0
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  uuid: ^4.3.0
  google_sign_in: ^6.2.2
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.10

  webview_flutter: ^4.4.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/trophy.png
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"